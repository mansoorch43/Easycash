<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyCash Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans pb-24">

    <div id="home-view" class="tab-content p-4 max-w-md mx-auto">
        <div class="bg-blue-600 text-white p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden mb-8 mt-4">
            <h2 class="text-xs uppercase tracking-widest opacity-80 font-bold">Current Balance</h2>
            <div class="flex items-baseline mt-2">
                <span class="text-2xl font-bold">Rs.</span>
                <span id="balance-display" class="text-6xl font-black ml-2">0</span>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="switchTab('withdraw')" class="bg-white text-blue-600 px-8 py-3 rounded-2xl font-bold text-sm shadow-lg active:scale-95 transition-transform">WITHDRAW</button>
                <button onclick="handleTask(20, 'Daily Gift')" class="bg-blue-400/30 border border-white/20 px-6 py-3 rounded-2xl font-bold text-sm active:scale-95 transition-transform">DAILY GIFT</button>
            </div>
            <i class="fas fa-money-bill-wave absolute -bottom-6 -right-6 text-white/10 text-[12rem] rotate-12"></i>
        </div>

        <h3 class="font-bold text-gray-800 ml-2 mb-4 uppercase tracking-wider text-xs flex items-center gap-2">
            <span class="w-1.5 h-1.5 bg-blue-600 rounded-full"></span> Earning Tasks
        </h3>

        <div onclick="handleTask(50, 'Watch Ads')" class="bg-white p-5 rounded-[2rem] border border-gray-100 shadow-sm flex items-center justify-between cursor-pointer active:bg-gray-50 transition-colors mb-4">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-xl">
                    <i class="fas fa-play-circle"></i>
                </div>
                <div>
                    <p class="font-bold text-gray-800">Watch Ads</p>
                    <p class="text-[11px] text-green-500 font-bold uppercase tracking-wide">Earn Rs. 50</p>
                </div>
            </div>
            <i class="fas fa-chevron-right text-gray-300 mr-2"></i>
        </div>
    </div>

    <div id="withdraw-view" class="tab-content hidden p-4 max-w-md mx-auto">
        <div class="bg-white p-6 rounded-[2.5rem] border border-gray-50 shadow-xl space-y-6">
            <div class="text-center">
                <h3 class="text-xl font-bold text-gray-800">Cash Out</h3>
                <p class="text-gray-400 text-xs mt-1">Select your payment method</p>
            </div>

            <div class="flex gap-3">
                <button id="j-btn" onclick="selectType('JazzCash')" class="w-1/2 py-5 border-2 rounded-2xl text-xs font-bold transition-all border-gray-100">JazzCash</button>
                <button id="e-btn" onclick="selectType('EasyPaisa')" class="w-1/2 py-5 border-2 rounded-2xl text-xs font-bold transition-all border-gray-100">EasyPaisa</button>
            </div>

            <div class="space-y-3">
                <div class="relative">
                    <i class="fas fa-phone absolute left-4 top-4 text-gray-300"></i>
                    <input id="acc-num" type="number" placeholder="Account Number" class="w-full p-4 pl-12 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-100">
                </div>
                <div class="relative">
                    <i class="fas fa-hand-holding-usd absolute left-4 top-4 text-gray-300"></i>
                    <input id="acc-val" type="number" placeholder="Amount (Min 500)" class="w-full p-4 pl-12 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-100">
                </div>
            </div>

            <button onclick="handlePayout()" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-100 active:scale-95 transition-transform">
                SUBMIT REQUEST
            </button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/90 backdrop-blur-md border-t flex justify-around p-4 shadow-[0_-5px_15px_rgba(0,0,0,0.02)]">
        <button onclick="switchTab('home')" class="flex flex-col items-center gap-1 text-blue-600">
            <i class="fas fa-home"></i><span class="text-[10px] font-bold">Home</span>
        </button>
        <button onclick="switchTab('withdraw')" class="flex flex-col items-center gap-1 text-gray-400">
            <i class="fas fa-wallet"></i><span class="text-[10px] font-bold">Wallet</span>
        </button>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDoZC4DiqerK8KFsy0HLXQlhAdMIxmIA58",
            authDomain: "easycash-79524.firebaseapp.com",
            projectId: "easycash-79524",
            storageBucket: "easycash-79524.firebasestorage.app",
            messagingSenderId: "500388363759",
            appId: "1:500388363759:web:1636e5592b09dd49638a1a"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let userData = { balance: 0 };
        let currentUID = "";
        let pMethod = "";

        // Tab Switching Function
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tab + '-view').classList.remove('hidden');
        }

        // Real-time Auth and Balance Sync
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUID = user.uid;
                db.collection("users").doc(currentUID).onSnapshot((doc) => {
                    if (doc.exists()) {
                        userData = doc.data();
                        document.getElementById('balance-display').innerText = userData.balance || 0;
                    } else {
                        db.collection("users").doc(currentUID).set({ balance: 0 });
                    }
                });
            } else {
                auth.signInAnonymously().catch(e => console.error("Auth Error:", e));
            }
        });

        // Earn Balance Function
        async function handleTask(reward, taskName) {
            if (!currentUID) return alert("Pehle login hone dein...");
            try {
                const newBalance = (userData.balance || 0) + reward;
                await db.collection("users").doc(currentUID).update({ balance: newBalance });
                alert("Mubarak! " + taskName + " se Rs. " + reward + " mil gaye.");
            } catch (e) {
                console.error("Task Error:", e);
                alert("Connection ka masla hai!");
            }
        }

        // Payout Selection
        function selectType(type) {
            pMethod = type;
            document.getElementById('j-btn').className = type === 'JazzCash' ? "w-1/2 py-5 bg-blue-600 text-white rounded-2xl font-bold shadow-md shadow-blue-100" : "w-1/2 py-5 border-2 rounded-2xl text-xs font-bold border-gray-100 text-gray-400";
            document.getElementById('e-btn').className = type === 'EasyPaisa' ? "w-1/2 py-5 bg-blue-600 text-white rounded-2xl font-bold shadow-md shadow-blue-100" : "w-1/2 py-5 border-2 rounded-2xl text-xs font-bold border-gray-100 text-gray-400";
        }

        // Withdrawal Logic
        async function handlePayout() {
            const acc = document.getElementById('acc-num').value;
            const val = parseInt(document.getElementById('acc-val').value);

            if (!pMethod) return alert("JazzCash ya EasyPaisa select karein!");
            if (!acc || acc.length < 10) return alert("Sahi account number likhen!");
            if (isNaN(val) || val < 500) return alert("Kam az kam Rs. 500 nikalwa sakte hain.");
            if (userData.balance < val) return alert("Aapka balance kam hai!");

            try {
                // Save Request
                await db.collection("withdrawals").add({
                    uid: currentUID,
                    amount: val,
                    method: pMethod,
                    account: acc,
                    status: "Pending",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Deduct Balance
                await db.collection("users").doc(currentUID).update({
                    balance: userData.balance - val
                });

                alert("Request bhej di gayi hai! 24 ghantay mein check karein.");
                document.getElementById('acc-num').value = "";
                document.getElementById('acc-val').value = "";
            } catch (e) {
                alert("Error: " + e.message);
            }
        }
    </script>
</body>
</html>
