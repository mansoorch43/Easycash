<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Cash Pro | Earning App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 pb-20">

    <header class="bg-blue-600 p-4 text-white flex justify-between items-center shadow-lg">
        <h1 class="font-bold text-xl">EasyCash Pro</h1>
        <div class="bg-blue-700 px-3 py-1 rounded-full text-sm">
            Rs. <span id="balance">0</span>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <div class="bg-white p-6 rounded-2xl shadow-md text-center mb-6">
            <p class="text-gray-500 text-sm">Available Balance</p>
            <h2 class="text-4xl font-bold text-gray-800">Rs. <span id="main-balance">0</span></h2>
        </div>

        <button onclick="getReward()" class="w-full bg-green-500 text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition mb-4">
            <i class="fas fa-play-circle mr-2"></i> Watch Ad & Earn
        </button>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around">
        <button class="text-blue-600"><i class="fas fa-home"></i></button>
        <button class="text-gray-400"><i class="fas fa-wallet"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Aapki sahi configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDoZC4DiqrK8KFsy0HlXQlhAdMIxmIA58",
            authDomain: "easycash-79524.firebaseapp.com",
            projectId: "easycash-79524",
            storageBucket: "easycash-79524.appspot.com",
            messagingSenderId: "500388363759",
            appId: "1:500388363759:web:1636e5592b09dd49638a1a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Sirf test ke liye ek ID (Asli app mein yahan user ID aayegi)
        const userRef = doc(db, "users", "test_user");

        // Real-time updates
        onSnapshot(userRef, (doc) => {
            if (doc.exists()) {
                const data = doc.data();
                document.getElementById('balance').innerText = data.balance;
                document.getElementById('main-balance').innerText = data.balance;
            }
        });

        window.getReward = async () => {
            alert("Ad loading... Please wait.");
            await updateDoc(userRef, { balance: increment(50) });
        };
    </script>
</body>
</html>
