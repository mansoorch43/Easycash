<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyCash Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 pb-24">

    <div id="home-view" class="tab-content p-4 max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black text-blue-600 italic">EasyCash<span class="text-gray-800">Pro</span></h1>
            <div class="bg-blue-50 px-4 py-2 rounded-full flex items-center gap-2">
                <i class="fas fa-coins text-yellow-500"></i>
                <span id="top-balance" class="font-bold text-blue-600">0</span>
            </div>
        </div>

        <div class="bg-blue-600 text-white p-8 rounded-[2.5rem] shadow-xl mb-8 relative overflow-hidden">
            <p class="text-xs uppercase opacity-80 font-bold tracking-widest">Current Balance</p>
            <div class="flex items-baseline mt-2">
                <span class="text-2xl font-bold font-serif italic">Rs.</span>
                <span id="main-balance" class="text-6xl font-black ml-2 leading-none">0</span>
            </div>
            <div class="flex gap-3 mt-8 relative z-10">
                <button onclick="switchTab('withdraw')" class="bg-white text-blue-600 px-8 py-3 rounded-2xl font-bold text-sm shadow-lg active:scale-95 transition-transform">WITHDRAW</button>
                <button onclick="handleTask(20, 'Daily Bonus')" class="bg-blue-400/30 border border-white/20 px-6 py-3 rounded-2xl font-bold text-sm active:scale-95 transition-transform">DAILY GIFT</button>
            </div>
            <i class="fas fa-wallet absolute -bottom-4 -right-4 text-white/10 text-9xl"></i>
        </div>

        <h3 class="font-bold text-gray-800 ml-2 mb-4 text-sm uppercase tracking-wider underline decoration-blue-500 decoration-4">Earning Tasks</h3>
        
        <div class="space-y-4">
            <div onclick="handleTask(50, 'Watch Ads')" class="bg-white p-5 rounded-[2rem] border border-gray-100 shadow-sm flex items-center justify-between cursor-pointer active:bg-gray-50">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-xl"><i class="fas fa-play"></i></div>
                    <div><p class="font-bold text-gray-800">Watch Ads</p><p class="text-[10px] text-green-500 font-bold uppercase">Earn Rs. 50</p></div>
                </div>
                <i class="fas fa-chevron-right text-gray-300"></i>
            </div>

            <div onclick="shareApp()" class="bg-white p-5 rounded-[2rem] border border-gray-100 shadow-sm flex items-center justify-between cursor-pointer active:bg-gray-50">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-purple-50 text-purple-600 rounded-2xl flex items-center justify-center text-xl"><i class="fas fa-users"></i></div>
                    <div><p class="font-bold text-gray-800">Refer & Earn</p><p class="text-[10px] text-purple-500 font-bold uppercase">Rs. 200 Per Friend</p></div>
                </div>
                <i class="fas fa-chevron-right text-gray-300"></i>
            </div>
        </div>
    </div>

    <div id="withdraw-view" class="tab-content hidden p-4 max-w-md mx-auto mt-4">
        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-gray-50 space-y-6">
            <h3 class="text-xl font-bold text-center text-gray-800">Cash Out</h3>
            <div class="flex gap-3">
                <button id="j-btn" onclick="selectType('JazzCash')" class="w-1/2 py-5 border-2 rounded-2xl text-xs font-bold transition-all border-gray-100 text-gray-400">JazzCash</button>
                <button id="e-btn" onclick="selectType('EasyPaisa')" class="w-1/2 py-5 border-2 rounded-2xl text-xs font-bold transition-all border-gray-100 text-gray-400">EasyPaisa</button>
            </div>
            <div class="space-y-3">
                <input id="acc-num" type="number" placeholder="Account Number" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border border-transparent focus:border-blue-500">
                <input id="acc-val" type="number" placeholder="Amount (Min 500)" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border border-transparent focus:border-blue-500">
            </div>
            <button onclick="handlePayout()" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">SUBMIT REQUEST</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-lg border-t flex justify-around p-4 max-w-md mx-auto">
        <button onclick="switchTab('home')" class="flex flex-col items-center text-blue-600"><i class="fas fa-home"></i><span class="text-[10px] font-bold">Home</span></button>
        <button onclick="switchTab('withdraw')" class="flex flex-col items-center text-gray-400"><i class="fas fa-wallet"></i><span class="text-[10px] font-bold">Wallet</span></button>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDoZC4DiqerK8KFsy0HLXQlhAdMIxmIA58",
            authDomain: "easycash-79524.firebaseapp.com",
            projectId: "easycash-79524",
            storageBucket: "easycash-79524.firebasestorage.app",
            messagingSenderId: "500388363759",
            appId: "1:500388363759:web:1636e5592b09dd49638a1a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let userData = { balance: 0 };
        let currentUID = "";
        let pMethod = "";

        // Auto Login & Sync
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUID = user.uid;
                db.collection("users").doc(currentUID).onSnapshot((doc) => {
                    if (doc.exists()) {
                        userData = doc.data();
                        document.getElementById('main-balance').innerText = userData.balance || 0;
                        document.getElementById('top-balance').innerText = userData.balance || 0;
                    } else {
                        db.collection("users").doc(currentUID).set({ balance: 0, referralCode: "EC" + Math.floor(Math.random()*9000) });
                    }
                });
            } else {
                auth.signInAnonymously();
            }
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tab + '-view').classList.remove('hidden');
        }

        async function handleTask(reward, name) {
            if (!currentUID) return;
            const newBal = (userData.balance || 0) + reward;
            await db.collection("users").doc(currentUID).update({ balance: newBal });
            alert(name + " Complete! Rs." + reward + " added.");
        }

        function shareApp() {
            const code = userData.referralCode || "N/A";
            const text = `Join EasyCash Pro and earn Rs. 200 using my code: ${code}`;
            if (navigator.share) {
                navigator.share({ title: 'EasyCash Pro', text: text, url: window.location.href });
            } else {
                alert(text);
            }
        }

        function selectType(type) {
            pMethod = type;
            document.getElementById('j-btn').className = type === 'JazzCash' ? "w-1/2 py-5 bg-blue-600 text-white rounded-2xl font-bold" : "w-1/2 py-5 border-2 rounded-2xl text-xs font-bold text-gray-400";
            document.getElementById('e-btn').className = type === 'EasyPaisa' ? "w-1/2 py-5 bg-blue-600 text-white rounded-2xl font-bold" : "w-1/2 py-5 border-2 rounded-2xl text-xs font-bold text-gray-400";
        }

        async function handlePayout() {
            const acc = document.getElementById('acc-num').value;
            const val = parseInt(document.getElementById('acc-val').value);
            if (!pMethod || acc.length < 10 || isNaN(val) || val < 500) return alert("Sahi details likhen (Min 500)");
            if (userData.balance < val) return alert("Balance kam hai!");

            await db.collection("withdrawals").add({ uid: currentUID, amount: val, method: pMethod, account: acc, status: "Pending", time: firebase.firestore.FieldValue.serverTimestamp() });
            await db.collection("users").doc(currentUID).update({ balance: userData.balance - val });
            alert("Withdraw Request Sent!");
        }
    </script>
</body>
</html>
